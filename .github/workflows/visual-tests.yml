name: Visual tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  visual:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ACT: '' # set by nektos/act when running locally
      DB_PATH: data/visual-test.db
      PORT: '3993'
      AUTH_SECRET: visual-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Cache node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Resolve Playwright Chromium path
        id: playwright-chromium
        run: echo "path=$(node --input-type=module -e "import { chromium } from '@playwright/test'; console.log(chromium.executablePath())")" >> $GITHUB_OUTPUT

      - name: Run visual tests
        run: npm run test:visual
        env:
          CI: true

      - name: Run Lighthouse
        run: npm run test:lighthouse
        env:
          CI: true
          CHROME_PATH: ${{ steps.playwright-chromium.outputs.path }}

      - name: Generate Lighthouse badge
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && !env.ACT }}
        run: npm run lighthouse:badge

      - name: Upload Lighthouse report
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: warn

      - name: Commit Lighthouse badge
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && !env.ACT }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update Lighthouse badge and screenshot [skip ci]'
          file_pattern: lighthouse-badges/**

      - name: Upload Playwright report
        if: ${{ success() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/index.html
          archive: false
          if-no-files-found: error

      - name: Upload Playwright report (act)
        if: ${{ success() && env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: error

      - name: Upload failure artifacts
        if: ${{ failure() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/**/*.png
          if-no-files-found: warn

      - name: Upload failure artifacts (act)
        if: ${{ failure() && env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/**/*.png
          if-no-files-found: warn

      - name: Upload reference snapshots
        if: ${{ failure() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-reference
          path: tests/screenshots-reference/
          if-no-files-found: warn

      - name: Upload reference snapshots (act)
        if: ${{ failure() && env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-reference
          path: tests/screenshots-reference/
          if-no-files-found: warn
